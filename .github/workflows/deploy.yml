name: 自动构建并部署到阿里云

on:
  push:
    branches:
      - main  # 确保这里是你的主分支名

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 获取代码
        uses: actions/checkout@v3

      - name: 2. 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3. 安装依赖并打包
        run: |
          npm install
          npm run build

      - name: 4. 传输文件到阿里云
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_PWD }}
          port: 22
          source: "dist/*"  # 如果打包后是 build 文件夹，请改为 "build/*"
          target: "/www/wwwroot/dementor.hey-makkie.cn"
          strip_components: 1
